<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>balance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f0e13;
    --panel:#17151d;
    --panel-2:#1e1b26;
    --line:#2b2733;
    --text:#ece9f2;
    --muted:#8b859a;
    --lilac:#b9a4e8;
    --lilac-dim:#5f5478;
    --good:#8fd6a8;
    --bad:#e8a4a4;
    --teal:#4fc3bb;
    --teal-dark:#0d2b29;
    --grey-bar:#5a5568;
    --lightblue:#8fc9e8;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Space Grotesk',sans-serif;
    min-height:100vh;
    padding:28px 18px 60px;
  }
  .wrap{max-width:520px;margin:0 auto;}
  header{margin-bottom:28px;}
  .eyebrow{
    font-family:'Space Mono',monospace;
    font-size:12px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--lilac-dim);
    margin-bottom:6px;
  }
  h1{
    font-size:28px;
    font-weight:700;
    margin:0;
    letter-spacing:-0.01em;
  }
  .sub{color:var(--muted);font-size:14px;margin-top:6px;}

  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px;
    margin-bottom:16px;
  }

  .date-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:16px;
  }
  .date-row input[type=date]{
    background:transparent;
    border:none;
    color:var(--text);
    font-family:'Space Mono',monospace;
    font-size:14px;
  }
  .nav-btn{
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--muted);
    border-radius:8px;
    width:30px;height:30px;
    font-size:14px;
    cursor:pointer;
  }
  .nav-btn:hover{color:var(--lilac);border-color:var(--lilac-dim);}

  .input-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-bottom:16px;
  }
  .field label{
    display:block;
    font-family:'Space Mono',monospace;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:8px;
  }
  .field input{
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px;
    color:var(--text);
    font-family:'Space Mono',monospace;
    font-size:18px;
  }
  .field input:focus{outline:none;border-color:var(--lilac);}

  .balance-row{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    padding-top:14px;
    border-top:1px dashed var(--line);
  }
  .balance-label{font-size:12px;color:var(--muted);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:0.08em;}
  .balance-value{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;}
  .balance-value.deficit{color:var(--good);}
  .balance-value.surplus{color:var(--bad);}
  .balance-value.flat{color:var(--muted);}

  .stats-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-bottom:16px;
  }
  .stat{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 12px;
    text-align:center;
  }
  .stat-value{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;}
  .stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:4px;}

  .chart-card{
    padding:20px 16px 12px;
  }
  .chart-title{
    font-family:'Space Mono',monospace;
    font-size:12px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:14px;
  }
  .legend{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:16px;
  }
  .legend-group{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .legend-title{
    font-family:'Space Mono',monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--lilac-dim);
    width:56px;
    flex-shrink:0;
  }
  .legend-items{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
  }
  .legend-item{
    display:flex;
    align-items:center;
    gap:6px;
    font-family:'Space Mono',monospace;
    font-size:11px;
    color:var(--muted);
  }
  .legend-item i{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
  svg{display:block;width:100%;height:auto;}
  .grid-line{stroke:var(--line);stroke-width:1;}
  .bar-burned{fill:var(--grey-bar);}
  .bar-lightblue{fill:var(--lightblue);}
  .bar-green{fill:var(--good);}
  .bar-red{fill:var(--bad);}
  .day-label{
    fill:var(--muted);
    font-family:'Space Mono',monospace;
    font-size:9px;
  }
  .empty-note{
    color:var(--muted);
    font-size:13px;
    text-align:center;
    padding:20px 0;
  }

  .week-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--teal);
    color:var(--teal-dark);
    padding:8px 12px;
    border-radius:8px;
    font-family:'Space Mono',monospace;
    font-size:11px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.04em;
    margin:14px 0 8px;
  }
  .week-header:first-child{margin-top:0;}

  .log-list{display:flex;flex-direction:column;gap:8px;}
  .log-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 12px;
    background:var(--panel-2);
    border-radius:10px;
    font-family:'Space Mono',monospace;
    font-size:12px;
  }
  .log-date{color:var(--muted);}
  .log-nums{color:var(--text);}
  .log-bal{font-weight:700;}

  footer{
    text-align:center;
    color:var(--lilac-dim);
    font-family:'Space Mono',monospace;
    font-size:11px;
    margin-top:30px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">calories in / calories out</div>
    <h1>balance</h1>
  </header>

  <div class="card">
    <div class="date-row">
      <button class="nav-btn" id="prevDay">‹</button>
      <input type="date" id="dateInput">
      <button class="nav-btn" id="nextDay">›</button>
    </div>
    <div class="input-grid">
      <div class="field">
        <label>eaten (kcal)</label>
        <input type="number" id="eatenInput" inputmode="numeric" placeholder="0">
      </div>
      <div class="field">
        <label>burned (kcal)</label>
        <input type="number" id="burnedInput" inputmode="numeric" placeholder="0">
      </div>
    </div>
    <div class="balance-row">
      <span class="balance-label">balance</span>
      <span class="balance-value flat" id="balanceValue">—</span>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat">
      <div class="stat-value" id="statAvg7">—</div>
      <div class="stat-label">7d avg</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="statAvg30">—</div>
      <div class="stat-label">30d avg</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="statStreak">—</div>
      <div class="stat-label">deficit days</div>
    </div>
  </div>

  <div class="card chart-card">
    <div class="chart-title">last 14 days</div>
    <div class="legend">
      <div class="legend-group">
        <span class="legend-title">cals out</span>
        <div class="legend-items">
          <span class="legend-item"><i style="background:var(--grey-bar);"></i></span>
        </div>
      </div>
      <div class="legend-group">
        <span class="legend-title">cals in</span>
        <div class="legend-items">
          <span class="legend-item"><i style="background:var(--lightblue);"></i>under</span>
          <span class="legend-item"><i style="background:var(--good);"></i>in range</span>
          <span class="legend-item"><i style="background:var(--bad);"></i>over</span>
        </div>
      </div>
    </div>
    <div id="chartWrap"></div>
  </div>

  <div class="card">
    <div class="chart-title" style="margin-bottom:12px;">recent entries</div>
    <div class="log-list" id="logList"></div>
  </div>

  <footer>one day at a time — pippa</footer>
</div>

<script>
const STORAGE_KEY = 'balance-tracker-entries';

function loadEntries(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e){ return {}; }
}
function saveEntries(entries){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}
function formatLocalDate(d){
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}
function todayStr(){
  return formatLocalDate(new Date());
}
function shiftDate(dateStr, days){
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  dt.setDate(dt.getDate() + days);
  return formatLocalDate(dt);
}
function fmtDayLabel(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-GB', {weekday:'short'}).slice(0,2);
}

let entries = loadEntries();
let currentDate = todayStr();

const dateInput = document.getElementById('dateInput');
const eatenInput = document.getElementById('eatenInput');
const burnedInput = document.getElementById('burnedInput');
const balanceValue = document.getElementById('balanceValue');

function renderDayForm(){
  dateInput.value = currentDate;
  const e = entries[currentDate] || {};
  eatenInput.value = e.eaten ?? '';
  burnedInput.value = e.burned ?? '';
  updateBalanceDisplay();
}

function updateBalanceDisplay(){
  const eaten = parseFloat(eatenInput.value);
  const burned = parseFloat(burnedInput.value);
  if(isNaN(eaten) || isNaN(burned)){
    balanceValue.textContent = '—';
    balanceValue.className = 'balance-value flat';
    return;
  }
  const bal = eaten - burned;
  const sign = bal > 0 ? '+' : '';
  balanceValue.textContent = `${sign}${bal} kcal`;
  balanceValue.className = 'balance-value ' + (bal < 0 ? 'deficit' : bal > 0 ? 'surplus' : 'flat');
}

function persistCurrentInputs(){
  const eaten = eatenInput.value === '' ? null : parseFloat(eatenInput.value);
  const burned = burnedInput.value === '' ? null : parseFloat(burnedInput.value);
  if(eaten === null && burned === null){
    delete entries[currentDate];
  } else {
    entries[currentDate] = { eaten: eaten ?? 0, burned: burned ?? 0 };
  }
  saveEntries(entries);
  renderStats();
  renderChart();
  renderLog();
}

eatenInput.addEventListener('input', () => { updateBalanceDisplay(); persistCurrentInputs(); });
burnedInput.addEventListener('input', () => { updateBalanceDisplay(); persistCurrentInputs(); });

dateInput.addEventListener('change', () => {
  currentDate = dateInput.value || todayStr();
  renderDayForm();
});
document.getElementById('prevDay').addEventListener('click', () => {
  currentDate = shiftDate(currentDate, -1);
  renderDayForm();
});
document.getElementById('nextDay').addEventListener('click', () => {
  currentDate = shiftDate(currentDate, 1);
  renderDayForm();
});

function getSortedDates(){
  return Object.keys(entries).sort();
}

function renderStats(){
  const dates = getSortedDates();
  const now = todayStr();

  function avgOverDays(n){
    let sum = 0, count = 0;
    for(let i = 0; i < n; i++){
      const d = shiftDate(now, -i);
      if(entries[d]){
        sum += (entries[d].eaten - entries[d].burned);
        count++;
      }
    }
    return count > 0 ? Math.round(sum / count) : null;
  }

  const avg7 = avgOverDays(7);
  const avg30 = avgOverDays(30);
  document.getElementById('statAvg7').textContent = avg7 === null ? '—' : (avg7>0?'+':'')+avg7;
  document.getElementById('statAvg30').textContent = avg30 === null ? '—' : (avg30>0?'+':'')+avg30;

  let streak = 0;
  for(const d of dates){
    if(entries[d].eaten - entries[d].burned < 0) streak++;
  }
  document.getElementById('statStreak').textContent = streak;
}

function eatenBarClass(eaten, burned){
  const diff = eaten - burned;
  if(diff < -50) return 'bar-lightblue';
  if(diff > 50) return 'bar-red';
  return 'bar-green';
}

function renderChart(){
  const days = [];
  for(let i = 13; i >= 0; i--){
    days.push(shiftDate(todayStr(), -i));
  }
  const dayEntries = days.map(d => entries[d] || null);
  const known = dayEntries.filter(e => e !== null);

  const wrap = document.getElementById('chartWrap');
  if(known.length === 0){
    wrap.innerHTML = '<div class="empty-note">log a day to see the chart</div>';
    return;
  }

  const maxVal = Math.max(1800, ...known.map(e => Math.max(e.eaten, e.burned)));
  const width = 500, height = 190;
  const padTop = 10, padBottom = 20, padSide = 8;
  const groupGap = 6;
  const barGapInner = 2;
  const groupWidth = (width - padSide*2 - groupGap*(days.length-1)) / days.length;
  const barWidth = (groupWidth - barGapInner) / 2;
  const chartHeight = height - padTop - padBottom;
  const scale = chartHeight / maxVal;
  const baseline = height - padBottom;

  let bars = '';
  let gridLines = '';
  [0.25, 0.5, 0.75].forEach(f => {
    const y = baseline - chartHeight * f;
    gridLines += `<line class="grid-line" x1="${padSide}" y1="${y}" x2="${width-padSide}" y2="${y}"></line>`;
  });

  days.forEach((d, i) => {
    const gx = padSide + i * (groupWidth + groupGap);
    const e = dayEntries[i];
    if(e !== null){
      const burnedH = Math.max(e.burned * scale, 1.5);
      const eatenH = Math.max(e.eaten * scale, 1.5);
      const eatenCls = eatenBarClass(e.eaten, e.burned);
      bars += `<rect class="bar-burned" x="${gx}" y="${baseline - burnedH}" width="${barWidth}" height="${burnedH}" rx="2"></rect>`;
      bars += `<rect class="${eatenCls}" x="${gx + barWidth + barGapInner}" y="${baseline - eatenH}" width="${barWidth}" height="${eatenH}" rx="2"></rect>`;
    }
    bars += `<text class="day-label" x="${gx + groupWidth/2}" y="${height - 4}" text-anchor="middle">${fmtDayLabel(d)}</text>`;
  });

  const svg = `
  <svg viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">
    ${gridLines}
    ${bars}
  </svg>`;
  wrap.innerHTML = svg;
}

function getMonday(dateStr){
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  const day = dt.getDay();
  const diff = (day === 0 ? -6 : 1) - day;
  dt.setDate(dt.getDate() + diff);
  return formatLocalDate(dt);
}

function renderLog(){
  const dates = getSortedDates().reverse();
  const list = document.getElementById('logList');
  if(dates.length === 0){
    list.innerHTML = '<div class="empty-note">no entries yet</div>';
    return;
  }

  const thisMonday = getMonday(todayStr());
  const groups = {};
  const order = [];
  dates.forEach(d => {
    const wk = getMonday(d);
    if(!groups[wk]){ groups[wk] = []; order.push(wk); }
    groups[wk].push(d);
  });

  let html = '';
  order.forEach(wk => {
    const wkDates = groups[wk];
    const avg = Math.round(wkDates.reduce((s, d) => s + (entries[d].eaten - entries[d].burned), 0) / wkDates.length);
    const sunday = shiftDate(wk, 6);
    const label = wk === thisMonday ? 'This week' : `${fmtDate(wk)} – ${fmtDate(sunday)}`;
    const sign = avg > 0 ? '+' : '';
    html += `<div class="week-header"><span>${label}</span><span>${sign}${avg} kcal avg</span></div>`;
    html += wkDates.map(d => {
      const e = entries[d];
      const bal = e.eaten - e.burned;
      const bsign = bal > 0 ? '+' : '';
      const cls = bal < 0 ? 'deficit' : bal > 0 ? 'surplus' : 'flat';
      const dlabel = d === todayStr() ? 'today' : fmtDate(d);
      return `<div class="log-row">
        <span class="log-date">${dlabel}</span>
        <span class="log-nums">${e.eaten} in / ${e.burned} out</span>
        <span class="log-bal balance-value ${cls}" style="font-size:12px;">${bsign}${bal}</span>
      </div>`;
    }).join('');
  });
  list.innerHTML = html;
}

function fmtDate(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-GB', {day:'numeric', month:'short'});
}

renderDayForm();
renderStats();
renderChart();
renderLog();
</script>
</body>
</html>
